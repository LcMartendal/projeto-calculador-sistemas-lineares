<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculador de Matrizes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Calculador de Matrizes</h1>
            <p>Cálculos até matrizes 5x5</p>
        </div>

        <div class="main-content">
            <!-- Seção de Entrada -->
            <div class="input-section">
                <h2>Entrada da Matriz</h2>
                
                <div class="size-controls">
                    <div class="control-group">
                        <label for="rows">Número de Linhas:</label>
                        <select id="rows">
                            <option value="2" selected>2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label for="cols">Número de Colunas:</label>
                        <select id="cols">
                            <option value="2" selected>2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                        </select>
                    </div>
                    <button id="generateBtn" class="btn btn-primary">Gerar Matriz</button>
                </div>

                <div id="matrixInput" class="matrix-input">
                    <!-- Tabela de entrada será gerada aqui -->
                </div>

                <button id="calculateBtn" class="btn btn-success">Calcular</button>
            </div>

            <!-- Seção de Resultados -->
            <div class="results-section">
                <h2>Resultados</h2>

                <!-- Status da Matriz -->
                <div id="statusBox" class="result-box">
                    <h3>Status da Matriz</h3>
                    <div id="status" class="result-content">
                        Carregue uma matriz para análise
                    </div>
                </div>

                <!-- Determinante -->
                <div id="determinantBox" class="result-box">
                    <h3>Determinante</h3>
                    <div id="determinantResult" class="result-content">
                        -
                    </div>
                </div>

                <!-- Matriz Inversa -->
                <div id="inverseBox" class="result-box">
                    <h3>Matriz Inversa</h3>
                    <div id="inverseResult" class="result-content">
                        -
                    </div>
                </div>

                <!-- Matriz Original -->
                <div id="originalBox" class="result-box">
                    <h3>Matriz Original</h3>
                    <div id="originalResult" class="result-content">
                        -
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
