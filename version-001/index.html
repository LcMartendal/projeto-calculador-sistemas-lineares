<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Sistema Linear - Escalonamento</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Escalonamento de Sistema Linear</h1>

    <div class="config">
        <label>Equações</label>
        <input type="number" id="numeroEquacoes" min="1" value="2">

        <label>Colunas (variáveis + resultado)</label>
        <input type="number" id="numeroVariaveis" min="2" value="3">

        <button onclick="gerarInputs()">Gerar Sistema</button>
    </div>

    <div id="matrizInputs" class="matriz-inputs"></div>

    <button class="resolver" onclick="resolverSistema()">
        Escalonar Sistema
    </button>

    <h2>Passos do Escalonamento</h2>
    <div id="passos" class="passos"></div>

</div>

<script src="script.js"></script>
</body>
</html>
